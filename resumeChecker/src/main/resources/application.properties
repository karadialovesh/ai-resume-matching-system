spring.application.name=resumeChecker
spring.datasource.url=jdbc:postgresql://localhost:5432/resume_ai
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.temperature=0
spring.ai.ollama.chat.model=llama3

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000


spring.cache.type=redis
# Optional: cache key prefix
spring.cache.redis.key-prefix=resume-ai::
spring.cache.redis.cache-null-values=false